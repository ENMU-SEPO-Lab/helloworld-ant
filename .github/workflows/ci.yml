name: Ant CI Full

on:
    push:
        branches: [ main ]
    pull_request:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: 17

            - name: Install Ant
              run: sudo apt-get update && sudo apt-get install -y ant

            - name: Run JUnit Tests
              run: ant test

            # - name: Install PMD
            #   run: sudo apt-get install -y pmd

            # - name: Run PMD
            #   run: pmd check -d src -R rulesets/java/quickstart.xml -f text

            - name: Download PMD
              run: |
                  wget https://github.com/pmd/pmd/releases/download/pmd_releases/7.0.0/pmd-dist-7.0.0-bin.zip
                  unzip pmd-dist-7.0.0-bin.zip
                  mv pmd-bin-7.0.0 pmd

            - name: Run PMD
              run: |
                  mkdir -p reports
                  ./pmd/bin/pmd check \
                    -d src \
                    -R category/java/bestpractices.xml \
                    -f xml \
                    -r reports/pmd.xml || true

            - name: Install Checkstyle
              run: sudo apt-get install -y checkstyle

            - name: Run Checkstyle
              run: checkstyle -c /usr/share/checkstyle/sun_checks.xml src