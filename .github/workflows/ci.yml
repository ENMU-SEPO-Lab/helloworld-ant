name: Ant CI Full

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Set up Java
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3️⃣ Install Ant + tools
      - name: Install Ant, wget, unzip
        run: sudo apt-get update && sudo apt-get install -y ant wget unzip

      # 4️⃣ Run JUnit tests
      - name: Run JUnit Tests
        run: ant test

      # 5️⃣ PMD setup
      - name: Download PMD
        run: |
          wget https://github.com/pmd/pmd/releases/download/pmd_releases/7.0.0/pmd-dist-7.0.0-bin.zip
          unzip pmd-dist-7.0.0-bin.zip
          mv pmd-bin-7.0.0 pmd

      - name: Run PMD
        run: |
          mkdir -p reports
          ./pmd/bin/pmd check \
            -d src \
            -R category/java/bestpractices.xml \
            -f xml \
            -r reports/pmd.xml || true

      # 6️⃣ Checkstyle setup
      - name: Download Checkstyle
        run: |
          wget https://github.com/checkstyle/checkstyle/releases/download/checkstyle-10.12.4/checkstyle-10.12.4-all.jar
          mv checkstyle-10.12.4-all.jar checkstyle.jar

      - name: Run Checkstyle
        run: |
          mkdir -p reports
          java -jar checkstyle.jar \
            -c /google_checks.xml \
            -f xml \
            -o reports/checkstyle.xml src || true

      # 7️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          if [ -f requirements.txt ]; then
              pip install -r requirements.txt
          fi

      # 8️⃣ Run grading script
      - name: Run grading script
        run: python grade.py

      # 9️⃣ Upload grading reports
      - name: Upload grading feedback
        uses: actions/upload-artifact@v4
        with:
          name: grading-feedback
          path: reports/

      # 🔟 Send grading feedback email to test address
      - name: Send Feedback Email (Test)
        if: always()  # Run even if tests fail
        env:
          GMAIL_USER: alarusie@gmail.com
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: essa.imhmed@enmu.edu
        run: |
          python <<'EOF'
          import os
          import smtplib
          from email.message import EmailMessage

          gmail_user = os.environ['GMAIL_USER']
          gmail_pass = os.environ['GMAIL_APP_PASSWORD']
          to_email = os.environ['TO_EMAIL']

          feedback_file = 'reports/feedback.md'
          try:
              with open(feedback_file, 'r') as f:
                  feedback = f.read()
          except FileNotFoundError:
              feedback = "No feedback generated. Please check the build logs."

          msg = EmailMessage()
          msg['Subject'] = 'Automated Grading Feedback - Test'
          msg['From'] = gmail_user
          msg['To'] = to_email
          msg.set_content(feedback)

          with smtplib.SMTP('smtp.gmail.com', 587) as server:
              server.starttls()
              server.login(gmail_user, gmail_pass)
              server.send_message(msg)

          print(f"Test feedback email sent successfully to {to_email}!")
          EOF