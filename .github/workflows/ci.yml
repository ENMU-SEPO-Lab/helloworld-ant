name: Ant CI Full with EvoSuite

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      TO_EMAIL: essa.imhmed@enmu.edu  # Hardcoded test email

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: sudo apt-get update && sudo apt-get install -y ant unzip wget

      # Download EvoSuite
      - run: wget https://github.com/EvoSuite/evosuite/releases/download/v1.1.0/evosuite-1.1.0.jar -O evosuite.jar

      # Run EvoSuite, compile, and run JUnit
      - run: ant evosuite compile-evosuite-tests test

      # PMD
      - run: |
          wget https://github.com/pmd/pmd/releases/download/pmd_releases/7.0.0/pmd-dist-7.0.0-bin.zip
          unzip pmd-dist-7.0.0-bin.zip
          mv pmd-bin-7.0.0 pmd
      - run: |
          mkdir -p reports
          ./pmd/bin/pmd check \
            -d src \
            -R category/java/bestpractices.xml \
            -f xml \
            -r reports/pmd.xml || true

      # Checkstyle
      - run: |
          wget https://github.com/checkstyle/checkstyle/releases/download/checkstyle-10.12.4/checkstyle-10.12.4-all.jar
          mv checkstyle-10.12.4-all.jar checkstyle.jar
      - run: java -jar checkstyle.jar -c /google_checks.xml -f xml -o reports/checkstyle.xml src || true

      # Python grading
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - run: python grade.py

      # Upload reports
      - uses: actions/upload-artifact@v4
        with:
          name: grading-feedback
          path: reports/

      # Send email with attachments
      - name: Send feedback email
        run: |
          python - <<EOF
          import os, smtplib, ssl
          from email.message import EmailMessage

          gmail_user = os.environ['GMAIL_USER']
          gmail_pass = os.environ['GMAIL_APP_PASSWORD']
          to_email = os.environ['TO_EMAIL']

          msg = EmailMessage()
          msg['Subject'] = 'Course Feedback Report'
          msg['From'] = gmail_user
          msg['To'] = to_email
          msg.set_content('Dear Student,\n\nPlease find attached your grading feedback report.\n\nBest regards,\nInstructor')

          # Attach all files in reports/
          reports_dir = 'reports'
          for f in os.listdir(reports_dir):
              with open(os.path.join(reports_dir,f),'rb') as file:
                  data = file.read()
                  msg.add_attachment(data, maintype='application', subtype='octet-stream', filename=f)

          context = ssl.create_default_context()
          with smtplib.SMTP_SSL('smtp.gmail.com', 465, context=context) as server:
              server.login(gmail_user, gmail_pass)
              server.send_message(msg)

          print("Feedback email sent successfully!")
          EOF